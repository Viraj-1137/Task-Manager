<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">
  <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

  <input id="name" placeholder="Name" class="border p-2 w-full mb-3 rounded">
  <input id="email" placeholder="Email" class="border p-2 w-full mb-3 rounded">
  <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-4 rounded">

  <button onclick="register()" class="bg-green-500 text-white w-full py-2 rounded hover:bg-green-600">Register</button>

  <p class="text-center mt-4 text-sm">
    Already have an account?
    <a href="login.html" class="text-blue-500">Login</a>
  </p>
</div>

<script>
async function register(){
 const res = await fetch('http://localhost:5000/auth/register',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({name:name.value,email:email.value,password:password.value})
 });

 const data = await res.json();
 alert(data.msg || 'Registered');
 window.location='login.html';
}
</script>

</body>
</html>
