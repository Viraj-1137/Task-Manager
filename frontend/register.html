<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen bg-gradient-to-r from-green-400 via-blue-500 to-purple-600 flex flex-col items-center justify-center">

<h1 class="text-4xl font-bold text-white mb-6">Task Manager</h1>

<div class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-96">
  <h2 class="text-2xl font-semibold text-center mb-6">Create Account 🚀</h2>

  <input id="name" placeholder="Name" class="border p-3 w-full mb-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
  <input id="email" placeholder="Email" class="border p-3 w-full mb-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
  <input id="password" type="password" placeholder="Password" class="border p-3 w-full mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">

  <button onclick="register()" class="bg-green-500 text-white w-full py-2 rounded-lg hover:bg-green-600 transition">Register</button>

  <p class="text-center mt-4 text-sm">
    Already have an account?
    <a href="index.html" class="text-blue-600 font-medium">Login</a>
  </p>
</div>

<script>
async function register(){
 const res = await fetch('https://task-manager-1hom.onrender.com/auth/register',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({name:name.value,email:email.value,password:password.value})
 });

 const data = await res.json();
 alert(data.msg || 'Registered');
 window.location='index.html';
}
</script>

</body>
</html>
