<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 flex flex-col items-center justify-center">

<h1 class="text-4xl font-bold text-white mb-6">Task Manager</h1>

<div class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-96">
  <h2 class="text-2xl font-semibold text-center mb-6">Welcome Back 👋</h2>

  <input id="email" placeholder="Email" class="border p-3 w-full mb-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
  <input id="password" type="password" placeholder="Password" class="border p-3 w-full mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

  <button onclick="login()" class="bg-blue-500 text-white w-full py-2 rounded-lg hover:bg-blue-600 transition">Login</button>

  <p class="text-center mt-4 text-sm">
    Don't have an account?
    <a href="register.html" class="text-blue-600 font-medium">Register</a>
  </p>
</div>

<script>
async function login(){
 const res = await fetch('https://task-manager-1hom.onrender.com/auth/login',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({email:email.value,password:password.value})
 });
 const data = await res.json();

 if(data.token){
   localStorage.setItem('token',data.token);
   window.location='dashboard.html';
 }else{
   alert(data.msg || 'Login failed');
 }
}
</script>

</body>
</html>
