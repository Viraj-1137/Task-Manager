<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">
  <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

  <input id="email" placeholder="Email" class="border p-2 w-full mb-3 rounded">
  <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-4 rounded">

  <button onclick="login()" class="bg-blue-500 text-white w-full py-2 rounded hover:bg-blue-600">Login</button>

  <p class="text-center mt-4 text-sm">
    Don't have an account?
    <a href="register.html" class="text-blue-500">Register</a>
  </p>
</div>

<script>
async function login(){
 const res = await fetch('http://localhost:5000/auth/login',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({email:email.value,password:password.value})
 });
 const data = await res.json();

 if(data.token){
   localStorage.setItem('token',data.token);
   window.location='dashboard.html';
 }else{
   alert(data.msg || 'Login failed');
 }
}
</script>

</body>
</html>
